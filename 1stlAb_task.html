<!DOCTYPE html>
<html>
  <head>
    <title>Hello, World!</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
 
 
 
<h5>Donor Information</h5>
<table>
  <tr>
    <td class="label">First Name*</td>
    <td class="field"><input type="text" name="first_name"></td>
  </tr>
 
  <tr>
    <td class="label">Last Name*</td>
    <td class="field"><input type="text" name="last_name"></td>
  </tr>
 
  <tr>
    <td class="label">Company</td>
    <td class="field"><input type="text" name="company"></td>
  </tr>
 
  <tr>
    <td class="label">Address 1*</td>
    <td class="field"><input type="text" name="address1"></td>
  </tr>
 
  <tr>
    <td class="label">Address 2</td>
    <td class="field"><input type="text" name="address2"></td>
  </tr>
 
  <tr>
    <td class="label">City*</td>
    <td class="field"><input type="text" name="city"></td>
  </tr>
 
  <tr>
    <td class="label">State*</td>
    <td class="field">
      <select name="state">
        <option value="">Select a State</option>
        <option>Dhaka</option>
        <option>Chittagong</option>
        <option>Cumilla</option>
      </select>
    </td>
  </tr>
 
  <tr>
    <td class="label">Zip Code*</td>
    <td class="field"><input type="text" name="zip"></td>
  </tr>
 
  <tr>
    <td class="label">Country*</td>
    <td class="field">
      <select name="country">
        <option value="">Select a Country</option>
        <option>United States</option>
        <option>Bangladesh</option>
        <option>India</option>
      </select>
    </td>
  </tr>
 
  <tr>
    <td class="label">Phone</td>
    <td class="field"><input type="tel" name="phone"></td>
  </tr>
 
  <tr>
    <td class="label">Fax</td>
    <td class="field"><input type="tel" name="fax"></td>
  </tr>
 
  <tr>
    <td class="label">Email*</td>
    <td class="field"><input type="email" name="email"></td>
  </tr>
 
</table>
 
<button type="button">Reset</button>
<button type="button">Continue</button>
  </body>
</html>
